name: Bug report
description: Report something that isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what's wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or a screen recording. Drag and drop images directly into this field.
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Pixel 7
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: e.g. Android 14
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter version (if building from source)
      placeholder: e.g. 3.38.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else worth knowing (e.g. only happens after a fresh install, only with rollover enabled, etc.).
    validations:
      required: false
