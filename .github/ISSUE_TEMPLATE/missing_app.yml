name: Missing Essential App
description: Report an app that's essential to everyday device use but isn't showing up in the Allowed Apps list.
title: "[Missing App] "
labels: ["missing-app"]
body:
  - type: markdown
    attributes:
      value: |
        Code Meter's essential-apps list lives at
        [`data/essential_apps.txt`](https://github.com/hazyio/code_meter/blob/main/data/essential_apps.txt)
        in this repo, one app per line, in the format:

        ```
        appid,link
        ```

        For example:

        ```
        com.google.android.apps.maps,https://play.google.com/store/apps/details?id=com.google.android.apps.maps
        ```

        **The fastest way to get an app added is to edit the file yourself and open a pull
        request** — GitHub will fork the repo and start the PR for you automatically:

        👉 [**Edit `essential_apps.txt` and open a PR**](https://github.com/hazyio/code_meter/edit/main/data/essential_apps.txt)

        Just add your line(s) in the same `appid,link` format, then submit — no need to clone
        anything locally.

        If you'd rather not open a PR yourself, that's totally fine — fill out the form below
        instead and it'll get added for you.

  - type: textarea
    id: apps
    attributes:
      label: Missing app(s)
      description: >
        One app per line, in the format `appid,link` — where `appid` is the app's Android
        package name (e.g. `com.google.android.apps.maps`) and `link` is either its Play Store
        listing or its official landing/download page. You can list more than one app.
      placeholder: |
        com.google.android.apps.maps,https://play.google.com/store/apps/details?id=com.google.android.apps.maps
        com.example.messenger,https://example.com/download
    validations:
      required: true

  - type: dropdown
    id: app-type
    attributes:
      label: App type
      description: Is this a pre-installed system app, or one you installed yourself?
      options:
        - System app (came pre-installed on the device)
        - Third-party app (installed from Play Store, F-Droid, APK, etc.)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Device brand/model, Android version, or anything else that might help track this down.
    validations:
      required: false
